<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGAlpha/dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dashboard-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .dashboard-header h1 {
            color: #00d4aa;
            font-size: 1.8rem;
        }

        .dashboard-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
            margin-top: 80px;
        }

        .dashboard-btn {
            background: #16213e;
            color: #fff;
            border: 2px solid #00d4aa;
            border-radius: 15px;
            padding: 40px 60px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 280px;
        }

        .dashboard-btn:hover {
            background: #00d4aa;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.3);
        }

        .dashboard-btn .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .dashboard-btn .label {
            font-weight: bold;
        }

        .dashboard-btn .description {
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1>CGAlpha/dashboard</h1>
    </div>

    <div class="dashboard-container">
        <a href="library.html" class="dashboard-btn">
            <span class="icon">📚</span>
            <span class="label">Library</span>
            <span class="description">Biblioteca de contenido</span>
        </a>

        <a href="learning.html" class="dashboard-btn">
            <span class="icon">🎓</span>
            <span class="label">Learning</span>
            <span class="description">Sistema de aprendizaje</span>
        </a>
    </div>
</body>
</html>
